post:
  operationId: refreshIndexFamilyCutoverSnapshot
  summary: Refresh staged cutover snapshot for an index family
  description: Captures a new staged cutover snapshot boundary for a STAGED V2 index family
  tags:
    - index-management
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Index family ID to refresh
    - $ref: '../../parameters/x-okapi-tenant-header.yaml'
  responses:
    '200':
      description: Cutover snapshot refresh completed successfully
      content:
        application/json:
          schema:
            $ref: '../../schemas/entity/indexFamilyStatusResponse.yaml'
    '400':
      $ref: '../../responses/badRequestResponse.yaml'
    '404':
      description: Index family not found
    '500':
      $ref: '../../responses/internalServerErrorResponse.yaml'
