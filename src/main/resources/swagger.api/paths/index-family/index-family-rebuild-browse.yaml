post:
  operationId: rebuildIndexFamilyBrowse
  summary: Rebuild browse projections for an index family
  description: Starts asynchronous browse projection rebuild for the specified index family
  tags:
    - index-management
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Index family ID to rebuild browse projections for
    - $ref: '../../parameters/x-okapi-tenant-header.yaml'
  responses:
    '202':
      description: Browse rebuild has been started
      content:
        application/json:
          schema:
            $ref: '../../schemas/entity/indexFamilyStatusResponse.yaml'
    '400':
      $ref: '../../responses/badRequestResponse.yaml'
    '404':
      description: Index family not found
    '500':
      $ref: '../../responses/internalServerErrorResponse.yaml'
