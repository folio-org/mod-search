post:
  operationId: resumeIndexFamilyReindex
  summary: Resume index family reindex
  description: Resumes streaming reindex for the specified index family
  tags:
    - index-management
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Index family ID to resume reindex for
    - $ref: '../../parameters/x-okapi-tenant-header.yaml'
  responses:
    '202':
      description: Streaming reindex has been resumed
      content:
        application/json:
          schema:
            $ref: '../../schemas/entity/reindexFamilyJob.yaml'
    '400':
      $ref: '../../responses/badRequestResponse.yaml'
    '404':
      description: Index family not found
    '409':
      description: Index family is not resumable in its current state
    '500':
      $ref: '../../responses/internalServerErrorResponse.yaml'
