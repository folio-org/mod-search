put:
  operationId: setDefaultQueryVersion
  summary: Set default query version
  description: Updates the tenant's default query version
  tags:
    - index-management
  parameters:
    - name: version
      in: query
      required: true
      schema:
        type: string
      description: Version to set as default (e.g. "1")
    - $ref: '../../parameters/x-okapi-tenant-header.yaml'
  responses:
    '200':
      description: Default version updated
    '500':
      $ref: '../../responses/internalServerErrorResponse.yaml'
