get:
  operationId: getQueryVersionBindings
  summary: List query version bindings
  description: Returns all query version bindings for the current tenant
  tags:
    - index-management
  parameters:
    - $ref: '../../parameters/x-okapi-tenant-header.yaml'
  responses:
    '200':
      description: List of query version bindings
      content:
        application/json:
          schema:
            type: object
            properties:
              bindings:
                type: array
                items:
                  type: object
                  properties:
                    queryVersion:
                      type: string
                    pathType:
                      type: string
                      enum: [LEGACY, FLAT]
                    boundAt:
                      type: string
                      format: date-time
              defaultVersion:
                type: string
    '500':
      $ref: '../../responses/internalServerErrorResponse.yaml'
