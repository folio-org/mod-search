  tags:
    - search
  parameters:
    - $ref: '../../parameters/x-okapi-tenant-header.yaml'
    - $ref: '../../parameters/cql-query.yaml'
    - $ref: '../../parameters/linked-data-limit-param.yaml'
    - $ref: '../../parameters/offset-param.yaml'
  responses:
    '200':
      description: 'Linked data authority search result'
      content:
        application/json:
          schema:
            $ref: '../../schemas/response/linkedDataAuthoritySearchResult.yaml'
          examples:
            searchResult:
              $ref: '../../examples/result/linkedDataAuthoritySearchResult.yaml'
    '400':
      $ref: '../../responses/badRequestResponse.yaml'
    '500':
      $ref: '../../responses/internalServerErrorResponse.yaml'
